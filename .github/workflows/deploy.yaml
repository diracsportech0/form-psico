name: Deploy HTML with Injected Key

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject API Key
        # Reemplaza el texto temporal con tu Secret real
        run: sed -i 's/___GEMINI_API_KEY_PLACEHOLDER___/${{ secrets.GOOGLE_API_KEY }}/g' index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .