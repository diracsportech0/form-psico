name: Deploy HTML with Injected Key

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject API Key
        env:
          # Pasamos el secreto como variable de entorno de forma segura
          MY_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          if [ -z "$MY_API_KEY" ]; then
            echo "ERROR FATAL: El secreto GOOGLE_API_KEY está vacío o no se detectó."
            exit 1
          else
            echo "Secreto detectado correctamente. Procediendo a inyectar..."
            sed -i "s/___GEMINI_API_KEY_PLACEHOLDER___/${MY_API_KEY}/g" index.html
            echo "Inyección completada en index.html."
          fi